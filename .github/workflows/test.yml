name: CI

on:
  push:
    branches:
      - main
    paths:
      - 'Cargo.lock'
      - '**.rs'
      - '**.yml'
      - '**.toml'
      - '!**.md'
  pull_request:
    types: [opened, synchronize]
    paths:
      - 'Cargo.lock'
      - '**.rs'
      - '**.yml'
      - '**.toml'
      - '!**.md'

env:
  RUST_PREVIOUS_VERSION: 1.92.0

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prepare-checks:
    runs-on: ubuntu-latest
    outputs:
      rust-prev-version: ${{ env.RUST_PREVIOUS_VERSION }}
    steps:
      - name: Do Nothing
        if: false
        run: echo

  code-quality:
    runs-on: ubuntu-22.04
    needs: prepare-checks
    strategy:
      matrix:
        rust: [stable]
        include:
          - rust: stable
            toolchain: stable
    steps:
      - name: Setup Rust
        uses: tracel-ai/github-actions/setup-rust@v7
        with:
          rust-toolchain: ${{ matrix.toolchain }}
          cache-key: ${{ matrix.rust }}-linux
      # Audit disabled: upstream deps (quinn-proto, rustls-webpki, tar) have
      # unpatched advisories. Re-enable once they release fixes.
      # - name: Audit
      #   run: cargo xtask check audit
      - name: Format
        shell: bash
        env:
          TERM: xterm-256color
        run: cargo xtask check format
      - name: Lint
        run: cargo xtask check lint
      - name: Typos
        uses: tracel-ai/github-actions/check-typos@v7

  documentation:
    runs-on: ubuntu-22.04
    needs: prepare-checks
    strategy:
      matrix:
        rust: [stable]
        include:
          - rust: stable
            toolchain: stable
    steps:
      - name: Setup Rust
        uses: tracel-ai/github-actions/setup-rust@v7
        with:
          rust-toolchain: ${{ matrix.toolchain }}
          cache-key: ${{ matrix.rust }}-linux
      - name: Documentation Build
        run: cargo xtask doc build
      - name: Documentation Tests
        run: cargo xtask doc tests

  check-32bit:
    runs-on: ubuntu-22.04
    needs: [prepare-checks, code-quality]
    strategy:
      matrix:
        target:
          - i686-unknown-linux-gnu
          - armv7-unknown-linux-gnueabihf
    steps:
      - name: Setup Rust
        uses: tracel-ai/github-actions/setup-rust@v7
        with:
          rust-toolchain: stable
          cache-key: stable-linux-${{ matrix.target }}
      - name: Install target
        run: rustup target add ${{ matrix.target }}
      - name: Check 32-bit compilation
        run: cargo check -p burn-flex --target ${{ matrix.target }}

  check-no-std:
    runs-on: ubuntu-22.04
    needs: [prepare-checks, code-quality]
    strategy:
      matrix:
        include:
          # Cortex-M0 (RP2040) - no atomic CAS, needs critical-section polyfill
          - target: thumbv6m-none-eabi
            features: critical-section
          # Cortex-M4F (STM32F4, nRF52)
          - target: thumbv7em-none-eabihf
            features: ""
          # Cortex-M33 (RP2350, nRF5340)
          - target: thumbv8m.main-none-eabihf
            features: ""
          # WASM (browser/Node.js without std)
          - target: wasm32-unknown-unknown
            features: ""
    steps:
      - name: Setup Rust
        uses: tracel-ai/github-actions/setup-rust@v7
        with:
          rust-toolchain: stable
          cache-key: stable-linux-${{ matrix.target }}
      - name: Install target
        run: rustup target add ${{ matrix.target }}
      - name: Check no_std compilation
        run: cargo check -p burn-flex --target ${{ matrix.target }} --no-default-features --features "${{ matrix.features }}"

  linux-tests:
    runs-on: ubuntu-22.04
    needs: [prepare-checks, code-quality]
    strategy:
      matrix:
        rust: [stable, prev]
        include:
          - rust: stable
            toolchain: stable
          - rust: prev
            toolchain: ${{ needs.prepare-checks.outputs.rust-prev-version }}
    steps:
      - name: Setup Rust
        uses: tracel-ai/github-actions/setup-rust@v7
        with:
          rust-toolchain: ${{ matrix.toolchain }}
          cache-key: ${{ matrix.rust }}-linux
      - name: Tests
        run: cargo xtask test --release

  macos-tests:
    runs-on: macos-14
    needs: [prepare-checks, code-quality]
    strategy:
      matrix:
        rust: [stable]
        include:
          - rust: stable
            toolchain: stable
    steps:
      - name: Setup Rust
        uses: tracel-ai/github-actions/setup-rust@v7
        with:
          rust-toolchain: ${{ matrix.toolchain }}
          cache-key: ${{ matrix.rust }}-macos
      - name: Tests
        run: cargo xtask test --release

  windows-tests:
    runs-on: windows-2022
    needs: [prepare-checks, code-quality]
    strategy:
      matrix:
        rust: [stable]
        include:
          - rust: stable
            toolchain: stable
    steps:
      - name: Setup Rust
        uses: tracel-ai/github-actions/setup-rust@v7
        with:
          rust-toolchain: ${{ matrix.toolchain }}
          cache-key: ${{ matrix.rust }}-windows
      - name: Tests
        run: cargo xtask test --release
