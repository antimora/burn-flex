[package]
name = "burn-ember"
version = "0.0.1"
edition = "2024"
license = "MIT OR Apache-2.0"
description = "A fast, portable CPU backend for Burn"
repository = "https://github.com/antimora/burn-ember"
readme = false
authors = ["Dilshod Tadjibaev (@antimora)"]

exclude = ["*.md"]

[features]
default = ["std"]
std = []

[lib]
path = "src/lib.rs"

[dependencies]
burn-backend = { git = "https://github.com/tracel-ai/burn", version = "0.21" }
burn-std = { git = "https://github.com/tracel-ai/burn", version = "0.21" }
half = { version = "2", features = ["bytemuck"] }
bytemuck = { version = "1", features = ["derive"] }

[dev-dependencies]
burn-tensor = { git = "https://github.com/tracel-ai/burn", version = "0.21" }
